spring:
  datasource:
    url: jdbc:mysql://localhost:3306/treat?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${SPRING_DATABASE_USERNAME}
    password: ${SPRING_DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true