spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET}

oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000} # 기본값은 http://localhost:3000 (로컬 프론트), 운영/배포 시 환경변수 CORS_ALLOWED_ORIGINS로 주입

kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}

cloud:
  aws:
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false
    s3:
      bucket:
        kospi200: ${S3_BUCKET_KOSPI200:treat-kospi200}
        #finance-reports: ${S3_BUCKET_FINANCE_REPORTS:treat-finance-reports}
        #static: ${S3_BUCKET_STATIC:treat-static}