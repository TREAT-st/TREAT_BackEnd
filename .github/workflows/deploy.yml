name: Deploy to EC2

on:
  push:
    branches: [ main, feat/#8-CRUD-business-logic ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          aws s3 cp build/libs/demo-0.0.1-SNAPSHOT.jar s3://${{ secrets.S3_BUCKET }}/treat-app.jar

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          RDS_DATABASE_URL: ${{ secrets.RDS_DATABASE_URL }}
          RDS_DATABASE_USERNAME: ${{ secrets.RDS_DATABASE_USERNAME }}
          RDS_DATABASE_PASSWORD: ${{ secrets.RDS_DATABASE_PASSWORD }}
        run: |
          echo "$EC2_SSH_KEY" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem $EC2_USER@$EC2_HOST << EOF
            # 기존 프로세스 종료
            PID=\$(pgrep -f "treat-app.jar") && kill \$PID || true
            sleep 3

            # S3에서 최신 JAR 다운로드
            aws s3 cp s3://$S3_BUCKET/treat-app.jar /home/$EC2_USER/app/treat-app.jar

            # 실행 (환경변수 주입)
            nohup java -jar \
              -Xms128m -Xmx400m \
              -XX:MetaspaceSize=128m \
              -XX:MaxMetaspaceSize=128m \
              /home/$EC2_USER/app/treat-app.jar \
              --spring.profiles.active=dev \
              --RDS_DATABASE_URL=$RDS_DATABASE_URL \
              --RDS_DATABASE_USERNAME=$RDS_DATABASE_USERNAME \
              --RDS_DATABASE_PASSWORD=$RDS_DATABASE_PASSWORD \
              > /home/$EC2_USER/app/app.log 2>&1 &
          EOF

          rm -f key.pem

